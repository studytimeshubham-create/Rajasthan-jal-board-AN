<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rajasthan Jal Board - My Readings Log</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-title">💧 RJB Mobile</div>
    <div class="header-user">
      <span id="header-user-name">Reader</span>
      <button id="logout-btn" class="logout-btn">Logout</button>
    </div>
  </header>

  <!-- Content Container -->
  <div class="container">
    <div style="margin-top: 15px; margin-bottom: 20px;">
      <h1 style="font-size: 1.5rem; color: var(--primary); font-weight: bold;">My Readings Log</h1>
      <p style="font-size: 0.85rem; color: var(--text-muted);">View and filter your recently submitted readings.</p>
    </div>

    <!-- Filter Card -->
    <div class="card">
      <h2>Filter Log</h2>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px;">
        <div class="form-group" style="margin-bottom: 0;">
          <label for="filter-from" style="font-size: 0.75rem;">Date From</label>
          <input type="date" id="filter-from" style="height: 38px; font-size: 0.9rem;">
        </div>
        <div class="form-group" style="margin-bottom: 0;">
          <label for="filter-to" style="font-size: 0.75rem;">Date To</label>
          <input type="date" id="filter-to" style="height: 38px; font-size: 0.9rem;">
        </div>
      </div>
      <div style="display: flex; gap: 10px;">
        <button id="apply-filter-btn" class="btn btn-primary" style="height: 40px; font-size: 0.9rem;">Apply Filters</button>
        <button id="reset-filter-btn" class="btn btn-secondary" style="height: 40px; font-size: 0.9rem; flex: 0.5;">Reset</button>
      </div>
    </div>

    <!-- Readings List Container -->
    <div id="readings-container">
      <!-- Reading cards populated here -->
    </div>

    <!-- Load More Button -->
    <div style="margin-bottom: 20px; text-align: center;">
      <button id="load-more-btn" class="btn btn-secondary" style="display: none; margin-top: 10px;">Load More Readings</button>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="nav-bar">
    <a href="search.html" class="nav-item">
      <span class="nav-icon">🔍</span>
      <span>Search</span>
    </a>
    <a href="ledger.html" class="nav-item">
      <span class="nav-icon">📖</span>
      <span>Ledger</span>
    </a>
    <a href="my-readings.html" class="nav-item active">
      <span class="nav-icon">📋</span>
      <span>My Readings</span>
    </a>
  </nav>

  <!-- Loading Overlay -->
  <div id="loading-overlay" class="loading-spinner-overlay" style="display: none;">
    <div style="text-align: center;">
      <div class="spinner"></div>
      <p id="loading-text" style="margin-top: 12px; font-weight: bold; color: var(--primary);">Fetching logs...</p>
    </div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase_config.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
    import { collection, getDocs, query, where, orderBy, limit, startAfter } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    import { formatCurrency, formatKL } from "./billing-engine.js";

    const loadingOverlay = document.getElementById("loading-overlay");
    const loadingText = document.getElementById("loading-text");
    const logoutBtn = document.getElementById("logout-btn");
    
    // Filters & container
    const filterFrom = document.getElementById("filter-from");
    const filterTo = document.getElementById("filter-to");
    const applyFilterBtn = document.getElementById("apply-filter-btn");
    const resetFilterBtn = document.getElementById("reset-filter-btn");
    const readingsContainer = document.getElementById("readings-container");
    const loadMoreBtn = document.getElementById("load-more-btn");

    // State Variables
    let currentReader = null;
    let rawReadings = [];
    let queryMap = {}; // Maps reading_id -> status
    let lastVisibleDoc = null;
    let hasMore = true;

    // Check Auth State
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "index.html";
        return;
      }
      
      const profileStr = sessionStorage.getItem("meter_reader_profile");
      if (profileStr) {
        currentReader = JSON.parse(profileStr);
        document.getElementById("header-user-name").textContent = currentReader.name;
      }

      loadInitialLogs();
    });

    // Logout Functionality
    logoutBtn.addEventListener("click", async () => {
      loadingOverlay.style.display = "flex";
      try {
        await signOut(auth);
        sessionStorage.clear();
        window.location.href = "index.html";
      } catch (error) {
        console.error("Logout error:", error);
      }
      loadingOverlay.style.display = "none";
    });

    async function loadInitialLogs() {
      if (!currentReader) return;
      loadingText.textContent = "Loading correction queries and readings...";
      loadingOverlay.style.display = "flex";

      try {
        // 1. Fetch correction queries for this reader in a single batch to map statuses
        const queriesRef = collection(db, "correction_queries");
        const cqQuery = query(queriesRef, where("reader_uid", "==", currentReader.uid));
        const cqSnapshot = await getDocs(cqQuery);
        
        queryMap = {};
        cqSnapshot.forEach(doc => {
          const qData = doc.data();
          if (qData.reading_id) {
            queryMap[qData.reading_id] = qData.status;
          }
        });

        // 2. Load readings
        rawReadings = [];
        lastVisibleDoc = null;
        hasMore = true;
        await fetchReadingsBatch();

      } catch (error) {
        console.error("Error loading logs:", error);
        readingsContainer.innerHTML = `<div class="alert alert-danger">Failed to retrieve logs. Please try again.</div>`;
        loadingOverlay.style.display = "none";
      }
    }

    async function fetchReadingsBatch() {
      if (!currentReader || !hasMore) return;
      
      loadingOverlay.style.display = "flex";
      try {
        const readingsRef = collection(db, "readings");
        let q = null;
        
        // Single field index with order-by
        if (lastVisibleDoc) {
          q = query(
            readingsRef, 
            where("reader_uid", "==", currentReader.uid),
            orderBy("submitted_at", "desc"),
            startAfter(lastVisibleDoc),
            limit(25)
          );
        } else {
          q = query(
            readingsRef, 
            where("reader_uid", "==", currentReader.uid),
            orderBy("submitted_at", "desc"),
            limit(25)
          );
        }

        const snapshot = await getDocs(q);
        
        if (snapshot.empty) {
          hasMore = false;
          loadMoreBtn.style.display = "none";
          if (rawReadings.length === 0) {
            readingsContainer.innerHTML = `<div style="text-align:center; padding: 30px; color: var(--text-muted);">No readings submitted yet.</div>`;
          }
        } else {
          lastVisibleDoc = snapshot.docs[snapshot.docs.length - 1];
          if (snapshot.docs.length < 25) {
            hasMore = false;
            loadMoreBtn.style.display = "none";
          } else {
            loadMoreBtn.style.display = "block";
          }

          snapshot.forEach(doc => {
            const data = doc.data();
            data.id = doc.id;
            rawReadings.push(data);
          });

          // Render
          renderLogs();
        }
      } catch (error) {
        console.error("Firestore readings query failed, attempting local sort fallback...", error);
        // Fallback: fetch without order-by (extremely robust against missing index during development)
        const readingsRef = collection(db, "readings");
        const fallbackQ = query(readingsRef, where("reader_uid", "==", currentReader.uid));
        const fallbackSnapshot = await getDocs(fallbackQ);
        
        rawReadings = [];
        fallbackSnapshot.forEach(doc => {
          const data = doc.data();
          data.id = doc.id;
          rawReadings.push(data);
        });

        // Sort in memory by submitted_at desc
        rawReadings.sort((a, b) => {
          const tA = a.submitted_at ? a.submitted_at.toDate() : new Date(0);
          const tB = b.submitted_at ? b.submitted_at.toDate() : new Date(0);
          return tB - tA;
        });

        hasMore = false;
        loadMoreBtn.style.display = "none";
        renderLogs();
      }
      loadingOverlay.style.display = "none";
    }

    loadMoreBtn.addEventListener("click", fetchReadingsBatch);

    // Apply and Reset filter events
    applyFilterBtn.addEventListener("click", () => {
      renderLogs();
    });

    resetFilterBtn.addEventListener("click", () => {
      filterFrom.value = "";
      filterTo.value = "";
      renderLogs();
    });

    function renderLogs() {
      readingsContainer.innerHTML = "";

      const fromVal = filterFrom.value;
      const toVal = filterTo.value;

      let fromD = fromVal ? new Date(fromVal) : null;
      let toD = toVal ? new Date(toVal) : null;
      
      if (toD) {
        toD.setHours(23, 59, 59, 999); // End of day limit
      }

      // Filter local list
      const filtered = rawReadings.filter(r => {
        if (!r.submitted_at) return false;
        const d = r.submitted_at.toDate();

        if (fromD && d < fromD) return false;
        if (toD && d > toD) return false;
        return true;
      });

      if (filtered.length === 0) {
        readingsContainer.innerHTML = `<div style="text-align:center; padding: 30px; color: var(--text-muted);">No entries found matching filters.</div>`;
        return;
      }

      filtered.forEach(r => {
        const queryStatus = queryMap[r.id] || null;
        let badgeHTML = "";

        if (queryStatus) {
          if (queryStatus === "pending") {
            badgeHTML = `<span class="status-badge meter faulty" style="margin-left:5px;">Pending Query</span>`;
          } else if (queryStatus === "approved") {
            badgeHTML = `<span class="status-badge active" style="margin-left:5px;">Query Approved</span>`;
          } else if (queryStatus === "rejected") {
            badgeHTML = `<span class="status-badge inactive" style="margin-left:5px;">Query Rejected</span>`;
          }
        }

        const card = document.createElement("div");
        card.className = "card";
        
        let headerTitle = "Meter Reading";
        let cardColor = "var(--primary)";
        if (r.status === "skipped") {
          headerTitle = `Skipped (Cannot Read)`;
          cardColor = "var(--accent)";
        }

        const dateStr = r.reading_date || (r.submitted_at ? r.submitted_at.toDate().toLocaleDateString("en-IN") : "—");
        const timeStr = r.reading_time || (r.submitted_at ? r.submitted_at.toDate().toLocaleTimeString("en-IN") : "—");
        
        const consumptionStr = r.status === "skipped" ? "—" : formatKL(r.consumption || 0);
        const billAmtStr = r.status === "skipped" ? "—" : formatCurrency(r.full_bill_breakdown ? r.full_bill_breakdown.total_amount : 0);

        let detailsHTML = "";
        if (r.status !== "skipped" && r.full_bill_breakdown) {
          const b = r.full_bill_breakdown;
          
          let slabRows = "";
          if (b.slab_details) {
            b.slab_details.forEach(s => {
              slabRows += `
                <tr>
                  <td>${s.slab} (${formatKL(s.kl)} @ ₹${s.rate})</td>
                  <td class="amount">${formatCurrency(s.amount)}</td>
                </tr>
              `;
            });
          }

          detailsHTML = `
            <details style="margin-top:12px;">
              <summary>Invoice Breakdown Details</summary>
              <div style="padding-top: 8px;">
                <table class="bill-table" style="font-size:0.75rem; width:100%;">
                  <tbody>
                    ${slabRows}
                    <tr style="border-top:1px dashed var(--border);">
                      <td>Fixed Monthly Charge</td>
                      <td class="amount">${formatCurrency(b.fixed_charge || 0)}</td>
                    </tr>
                    <tr>
                      <td>Meter Service Charge</td>
                      <td class="amount">${formatCurrency(b.meter_service_charge || 0)}</td>
                    </tr>
                    <tr>
                      <td>IDS Surcharge (${b.ids_rate_pct || 0}%)</td>
                      <td class="amount">${formatCurrency(b.ids_charge || 0)}</td>
                    </tr>
                    <tr style="font-weight:bold;">
                      <td>Total Billed</td>
                      <td class="amount">${formatCurrency(b.subtotal_before_lps || 0)}</td>
                    </tr>
                    <tr style="color:var(--danger);">
                      <td>Previous Outstanding</td>
                      <td class="amount">${formatCurrency(b.previous_outstanding || 0)}</td>
                    </tr>
                    <tr style="color:var(--success);">
                      <td>Credit Applied</td>
                      <td class="amount">-${formatCurrency(b.credit_applied || 0)}</td>
                    </tr>
                    <tr style="font-weight:bold; border-top:1.5px solid var(--text);">
                      <td>Net Invoice Total</td>
                      <td class="amount">${formatCurrency(b.total_amount || 0)}</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </details>
          `;
        } else if (r.status === "skipped") {
          detailsHTML = `
            <div style="margin-top: 10px; font-size: 0.85rem; background-color:#fafafa; border:1px solid var(--border); padding:8px; border-radius:4px;">
              <strong>Reason Stated:</strong> ${r.cannot_read_reason || "—"}<br>
              <strong>Description:</strong> ${r.notes || "—"}
            </div>
          `;
        }

        // Highlight anomaly flag
        let anomalyAlert = "";
        if (r.anomaly_flagged) {
          anomalyAlert = `<span class="status-badge meter faulty" style="margin-left: 5px;">⚠️ Anomaly Flagged</span>`;
        }

        card.innerHTML = `
          <h2 style="font-size:1.1rem; color:${cardColor}; display:flex; justify-content:space-between; align-items:center;">
            <span>CIN: ${r.cin_no}</span>
            <span style="font-size:0.75rem; font-weight:normal; color:var(--text-muted);">${dateStr} | ${timeStr}</span>
          </h2>
          
          <div class="info-panel" style="margin-top:10px;">
            <div>
              <span class="info-label">Current Reading</span>
              <span class="info-value">${r.current_reading !== null ? formatKL(r.current_reading) : "Skipped"}</span>
            </div>
            <div>
              <span class="info-label">Consumption</span>
              <span class="info-value" style="font-weight:bold; color:var(--primary);">${consumptionStr}</span>
            </div>
            <div>
              <span class="info-label">Previous Reading</span>
              <span class="info-value">${formatKL(r.previous_reading || 0)}</span>
            </div>
            <div>
              <span class="info-label">Invoice Total</span>
              <span class="info-value" style="font-weight:bold; color:var(--primary);">${billAmtStr}</span>
            </div>
          </div>

          <div style="display:flex; justify-content:flex-start; align-items:center; flex-wrap:wrap; gap:5px; margin-top:10px; border-top:1px dashed var(--border); padding-top:8px;">
            <span class="info-label" style="margin-right:5px; margin-bottom:0;">Status Indicators:</span>
            <span class="status-badge ${r.status === 'skipped' ? 'inactive' : 'active'}">${r.status.toUpperCase()}</span>
            ${badgeHTML}
            ${anomalyAlert}
          </div>

          ${detailsHTML}
        `;

        readingsContainer.appendChild(card);
      });
    }
  </script>
</body>
</html>
